<svg viewBox="0 0 680 400" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tennis court in perspective with ball on the surface">
  <rect width="680" height="400" fill="#0d0d0d"/>

  <defs>
    <pattern id="mesh" width="9" height="10" patternUnits="userSpaceOnUse">
      <line x1="9" y1="0" x2="9" y2="10" stroke="#0d0d0d" stroke-opacity="0.3" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- court surface — bleeds off left, right, bottom -->
  <polygon points="190,50 490,50 724,440 -44,440" fill="#121212"/>

  <!-- court lines — stroke-width 1 -->
  <g stroke="#ffffff" stroke-width="1" fill="none">
    <!-- doubles outline -->
    <line x1="190" y1="50" x2="-44" y2="440" stroke-opacity="0.7"/>
    <line x1="490" y1="50" x2="724" y2="440" stroke-opacity="0.7"/>
    <line x1="190" y1="50" x2="490" y2="50" stroke-opacity="0.6"/>

    <!-- singles sidelines -->
    <line x1="215" y1="50" x2="15" y2="440" stroke-opacity="0.3"/>
    <line x1="465" y1="50" x2="665" y2="440" stroke-opacity="0.3"/>

    <!-- far service line -->
    <line x1="148" y1="120" x2="532" y2="120" stroke-opacity="0.3"/>
    <!-- near service line -->
    <line x1="46" y1="290" x2="634" y2="290" stroke-opacity="0.3"/>

    <!-- centre service line -->
    <line x1="340" y1="120" x2="340" y2="290" stroke-opacity="0.3"/>

    <!-- centre marks -->
    <line x1="340" y1="50" x2="340" y2="62" stroke-opacity="0.5"/>
    <line x1="340" y1="400" x2="340" y2="386" stroke-opacity="0.4"/>
  </g>

  <!-- depth: faint court echo -->
  <polygon points="194,54 486,54 718,440 -38,440" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- net — depth shadow -->
  <rect x="106" y="191" width="468" height="10" fill="#333333"/>
  <!-- net — white focal band -->
  <rect x="106" y="188" width="468" height="10" fill="#ffffff"/>
  <!-- net — mesh texture -->
  <rect x="106" y="188" width="468" height="10" fill="url(#mesh)"/>
  <!-- net posts -->
  <line x1="106" y1="188" x2="106" y2="176" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="574" y1="188" x2="574" y2="176" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1"/>

  <!-- ball trajectory — subtle dashed arc -->
  <path d="M490 340 Q 410 60 280 150" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 8" stroke-linecap="round"/>

  <!-- ball shadow -->
  <ellipse cx="282" cy="168" rx="12" ry="3" fill="#000000" opacity="0.3"/>

  <!-- tennis ball — sage green -->
  <circle cx="280" cy="150" r="16" fill="#6A8F6A"/>
  <!-- figure-8 seam lines -->
  <path d="M266 140 Q 280 158, 294 140" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M266 160 Q 280 142, 294 160" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5" stroke-linecap="round"/>
</svg>
