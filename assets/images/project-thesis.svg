<svg viewBox="0 0 680 400" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Semiconductor wafer with die allocation heat gradient">
  <rect width="680" height="400" fill="#0d0d0d"/>

  <!-- background concentric rings -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5">
    <circle cx="340" cy="200" r="220"/>
    <circle cx="340" cy="200" r="260"/>
    <circle cx="340" cy="200" r="300"/>
    <circle cx="340" cy="200" r="340"/>
  </g>

  <defs>
    <clipPath id="wafer">
      <circle cx="340" cy="200" r="175"/>
    </clipPath>
    <pattern id="dies" width="22" height="22" patternUnits="userSpaceOnUse">
      <line x1="22" y1="0" x2="22" y2="22" stroke="#2a2a2a" stroke-width="0.5"/>
      <line x1="0" y1="22" x2="22" y2="22" stroke="#2a2a2a" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- depth: faint wafer echo -->
  <circle cx="346" cy="206" r="175" fill="#141414" opacity="0.2"/>

  <!-- wafer body -->
  <circle cx="340" cy="200" r="175" fill="#141414"/>

  <!-- die grid -->
  <circle cx="340" cy="200" r="175" fill="url(#dies)" clip-path="url(#wafer)"/>

  <!-- heat gradient: top-right 0.9 → bottom-left 0.1 -->
  <g clip-path="url(#wafer)" fill="#5A7FA8">

    <!-- band 0.9 — top-right core -->
    <rect x="398" y="46" width="18" height="18" opacity="0.9"/>
    <rect x="420" y="46" width="18" height="18" opacity="0.9"/>
    <rect x="398" y="68" width="18" height="18" opacity="0.9"/>
    <rect x="420" y="68" width="18" height="18" opacity="0.9"/>
    <rect x="442" y="68" width="18" height="18" opacity="0.9"/>
    <rect x="442" y="46" width="18" height="18" opacity="0.9"/>
    <rect x="376" y="46" width="18" height="18" opacity="0.9"/>
    <rect x="376" y="68" width="18" height="18" opacity="0.9"/>
    <rect x="464" y="68" width="18" height="18" opacity="0.9"/>
    <rect x="398" y="90" width="18" height="18" opacity="0.9"/>
    <rect x="420" y="90" width="18" height="18" opacity="0.9"/>
    <rect x="442" y="90" width="18" height="18" opacity="0.9"/>

    <!-- band 0.7 — adjacent -->
    <rect x="354" y="46" width="18" height="18" opacity="0.7"/>
    <rect x="354" y="68" width="18" height="18" opacity="0.7"/>
    <rect x="354" y="90" width="18" height="18" opacity="0.7"/>
    <rect x="376" y="90" width="18" height="18" opacity="0.7"/>
    <rect x="464" y="90" width="18" height="18" opacity="0.7"/>
    <rect x="486" y="90" width="18" height="18" opacity="0.7"/>
    <rect x="464" y="112" width="18" height="18" opacity="0.7"/>
    <rect x="442" y="112" width="18" height="18" opacity="0.7"/>
    <rect x="420" y="112" width="18" height="18" opacity="0.7"/>
    <rect x="398" y="112" width="18" height="18" opacity="0.7"/>

    <!-- band 0.5 — transition -->
    <rect x="332" y="68" width="18" height="18" opacity="0.5"/>
    <rect x="332" y="90" width="18" height="18" opacity="0.5"/>
    <rect x="332" y="112" width="18" height="18" opacity="0.5"/>
    <rect x="354" y="112" width="18" height="18" opacity="0.5"/>
    <rect x="376" y="112" width="18" height="18" opacity="0.5"/>
    <rect x="486" y="112" width="18" height="18" opacity="0.5"/>
    <rect x="464" y="134" width="18" height="18" opacity="0.5"/>
    <rect x="442" y="134" width="18" height="18" opacity="0.5"/>
    <rect x="420" y="134" width="18" height="18" opacity="0.5"/>
    <rect x="398" y="134" width="18" height="18" opacity="0.5"/>
    <rect x="376" y="134" width="18" height="18" opacity="0.5"/>

    <!-- band 0.3 — middle zone -->
    <rect x="310" y="90" width="18" height="18" opacity="0.3"/>
    <rect x="310" y="112" width="18" height="18" opacity="0.3"/>
    <rect x="310" y="134" width="18" height="18" opacity="0.3"/>
    <rect x="332" y="134" width="18" height="18" opacity="0.3"/>
    <rect x="354" y="134" width="18" height="18" opacity="0.3"/>
    <rect x="354" y="156" width="18" height="18" opacity="0.3"/>
    <rect x="376" y="156" width="18" height="18" opacity="0.3"/>
    <rect x="398" y="156" width="18" height="18" opacity="0.3"/>
    <rect x="420" y="156" width="18" height="18" opacity="0.3"/>
    <rect x="442" y="156" width="18" height="18" opacity="0.3"/>
    <rect x="332" y="156" width="18" height="18" opacity="0.3"/>
    <rect x="310" y="156" width="18" height="18" opacity="0.3"/>
    <rect x="288" y="112" width="18" height="18" opacity="0.3"/>
    <rect x="288" y="134" width="18" height="18" opacity="0.3"/>

    <!-- band 0.15 — lower-left transition -->
    <rect x="266" y="134" width="18" height="18" opacity="0.15"/>
    <rect x="266" y="156" width="18" height="18" opacity="0.15"/>
    <rect x="288" y="156" width="18" height="18" opacity="0.15"/>
    <rect x="288" y="178" width="18" height="18" opacity="0.15"/>
    <rect x="310" y="178" width="18" height="18" opacity="0.15"/>
    <rect x="332" y="178" width="18" height="18" opacity="0.15"/>
    <rect x="354" y="178" width="18" height="18" opacity="0.15"/>
    <rect x="376" y="178" width="18" height="18" opacity="0.15"/>
    <rect x="398" y="178" width="18" height="18" opacity="0.15"/>
    <rect x="266" y="178" width="18" height="18" opacity="0.15"/>
    <rect x="244" y="156" width="18" height="18" opacity="0.15"/>
    <rect x="244" y="178" width="18" height="18" opacity="0.15"/>

    <!-- band 0.08 — bottom-left -->
    <rect x="222" y="178" width="18" height="18" opacity="0.08"/>
    <rect x="222" y="200" width="18" height="18" opacity="0.08"/>
    <rect x="244" y="200" width="18" height="18" opacity="0.08"/>
    <rect x="266" y="200" width="18" height="18" opacity="0.08"/>
    <rect x="288" y="200" width="18" height="18" opacity="0.08"/>
    <rect x="310" y="200" width="18" height="18" opacity="0.08"/>
    <rect x="222" y="222" width="18" height="18" opacity="0.08"/>
    <rect x="244" y="222" width="18" height="18" opacity="0.08"/>
    <rect x="266" y="222" width="18" height="18" opacity="0.08"/>
    <rect x="200" y="200" width="18" height="18" opacity="0.08"/>
    <rect x="200" y="222" width="18" height="18" opacity="0.08"/>
    <rect x="222" y="244" width="18" height="18" opacity="0.08"/>
    <rect x="244" y="244" width="18" height="18" opacity="0.08"/>
    <rect x="200" y="244" width="18" height="18" opacity="0.08"/>
    <rect x="200" y="266" width="18" height="18" opacity="0.08"/>
    <rect x="222" y="266" width="18" height="18" opacity="0.08"/>
  </g>

  <!-- wafer outline -->
  <circle cx="340" cy="200" r="175" fill="none" stroke="#ffffff" stroke-width="1.5"/>

  <!-- flat notch -->
  <line x1="300" y1="374" x2="380" y2="374" stroke="#0d0d0d" stroke-width="8"/>
  <line x1="306" y1="372" x2="374" y2="372" stroke="#ffffff" stroke-opacity="0.12" stroke-width="0.5"/>
</svg>
