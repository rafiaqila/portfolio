<svg viewBox="0 0 680 400" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Construction building facade with flagged windows and scaffolding">
  <rect width="680" height="400" fill="#0d0d0d"/>

  <!-- depth: faint building echo -->
  <rect x="-80" y="-40" width="470" height="510" fill="#151515" opacity="0.25"/>

  <!-- building facade — bleeds off left and top -->
  <rect x="-140" y="-100" width="480" height="560" fill="#1a1a1a"/>

  <!-- structural column dividing facade -->
  <line x1="170" y1="0" x2="170" y2="400" stroke="#2e2e2e" stroke-width="1"/>

  <!-- faint floor lines -->
  <g stroke="#1e1e1e" stroke-width="0.5">
    <line x1="0" y1="100" x2="340" y2="100"/>
    <line x1="0" y1="180" x2="340" y2="180"/>
    <line x1="0" y1="260" x2="340" y2="260"/>
    <line x1="0" y1="330" x2="340" y2="330"/>
  </g>

  <!-- building right edge -->
  <line x1="340" y1="0" x2="340" y2="400" stroke="#2e2e2e" stroke-width="0.5"/>

  <!-- UPPER FLOORS — small windows 14x12 -->
  <g fill="#101010">
    <rect x="24" y="18" width="14" height="12"/>
    <rect x="56" y="22" width="14" height="12"/>
    <rect x="96" y="16" width="14" height="12"/>
    <rect x="134" y="20" width="14" height="12"/>
    <rect x="190" y="18" width="14" height="12"/>
    <rect x="232" y="22" width="14" height="12"/>
    <rect x="278" y="16" width="14" height="12"/>
    <rect x="312" y="20" width="14" height="12"/>
  </g>
  <g fill="#101010">
    <rect x="28" y="58" width="14" height="12"/>
    <rect x="72" y="54" width="14" height="12"/>
    <rect x="118" y="60" width="14" height="12"/>
    <rect x="194" y="56" width="14" height="12"/>
    <rect x="248" y="60" width="14" height="12"/>
    <rect x="302" y="54" width="14" height="12"/>
  </g>

  <!-- MID FLOORS — medium windows 20x26 -->
  <g fill="#101010">
    <rect x="26" y="118" width="20" height="26"/>
    <rect x="78" y="122" width="20" height="26"/>
    <rect x="130" y="116" width="20" height="26"/>
    <rect x="192" y="120" width="20" height="26"/>
    <rect x="250" y="116" width="20" height="26"/>
    <rect x="302" y="122" width="20" height="26"/>
  </g>

  <!-- LOWER FLOORS — large windows 30x48 -->
  <g fill="#101010">
    <rect x="20" y="196" width="30" height="48"/>
    <rect x="80" y="192" width="30" height="48"/>
    <rect x="186" y="194" width="34" height="50"/>
    <rect x="256" y="198" width="34" height="50"/>
  </g>

  <!-- GROUND FLOOR — tall windows 36x58 -->
  <g fill="#101010">
    <rect x="22" y="272" width="36" height="56"/>
    <rect x="100" y="268" width="36" height="56"/>
    <rect x="190" y="270" width="40" height="58"/>
    <rect x="274" y="266" width="40" height="58"/>
  </g>

  <!-- amber flagged windows — only 4 -->
  <rect x="78" y="122" width="20" height="26" fill="#D48B3A"/>
  <rect x="302" y="54" width="14" height="12" fill="#D48B3A" opacity="0.8"/>
  <rect x="256" y="198" width="34" height="50" fill="#D48B3A" opacity="0.55"/>
  <rect x="100" y="268" width="36" height="56" fill="#D48B3A" opacity="0.4"/>

  <!-- white focal windows — 2 -->
  <rect x="192" y="120" width="20" height="26" fill="#ffffff"/>
  <rect x="56" y="22" width="14" height="12" fill="#ffffff" opacity="0.85"/>

  <!-- scaffold — two poles with rungs and X-bracing, dark grey -->
  <g stroke="#2a2a2a" stroke-width="1.5">
    <!-- vertical poles -->
    <line x1="370" y1="60" x2="370" y2="400"/>
    <line x1="440" y1="60" x2="440" y2="400"/>
    <!-- horizontal rungs -->
    <line x1="370" y1="60" x2="440" y2="60"/>
    <line x1="370" y1="128" x2="440" y2="128"/>
    <line x1="370" y1="196" x2="440" y2="196"/>
    <line x1="370" y1="264" x2="440" y2="264"/>
    <line x1="370" y1="332" x2="440" y2="332"/>
    <line x1="370" y1="400" x2="440" y2="400"/>
    <!-- diagonal cross-bracing -->
    <line x1="370" y1="60" x2="440" y2="128"/>
    <line x1="440" y1="60" x2="370" y2="128"/>
    <line x1="370" y1="128" x2="440" y2="196"/>
    <line x1="440" y1="128" x2="370" y2="196"/>
    <line x1="370" y1="196" x2="440" y2="264"/>
    <line x1="440" y1="196" x2="370" y2="264"/>
    <line x1="370" y1="264" x2="440" y2="332"/>
    <line x1="440" y1="264" x2="370" y2="332"/>
    <line x1="370" y1="332" x2="440" y2="400"/>
    <line x1="440" y1="332" x2="370" y2="400"/>
  </g>
</svg>
