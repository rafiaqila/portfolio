<svg viewBox="0 0 680 400" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Warehouse shelving rack with overlapping chat bubble">
  <rect width="680" height="400" fill="#0d0d0d"/>

  <!-- depth: faint shelf echo lines offset behind -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="-20" y1="88" x2="700" y2="88"/>
    <line x1="-20" y1="178" x2="700" y2="178"/>
    <line x1="-20" y1="268" x2="700" y2="268"/>
    <line x1="-20" y1="358" x2="700" y2="358"/>
    <line x1="8" y1="-20" x2="8" y2="420"/>
    <line x1="138" y1="-20" x2="138" y2="420"/>
    <line x1="268" y1="-20" x2="268" y2="420"/>
    <line x1="398" y1="-20" x2="398" y2="420"/>
    <line x1="528" y1="-20" x2="528" y2="420"/>
    <line x1="658" y1="-20" x2="658" y2="420"/>
  </g>

  <!-- shelving rack — bleeds all 4 edges -->
  <g stroke="#222222" stroke-width="1">
    <line x1="-20" y1="80" x2="700" y2="80"/>
    <line x1="-20" y1="170" x2="700" y2="170"/>
    <line x1="-20" y1="260" x2="700" y2="260"/>
    <line x1="-20" y1="350" x2="700" y2="350"/>
  </g>
  <g stroke="#2e2e2e" stroke-width="1">
    <line x1="0" y1="-20" x2="0" y2="420"/>
    <line x1="130" y1="-20" x2="130" y2="420"/>
    <line x1="260" y1="-20" x2="260" y2="420"/>
    <line x1="390" y1="-20" x2="390" y2="420"/>
    <line x1="520" y1="-20" x2="520" y2="420"/>
    <line x1="650" y1="-20" x2="650" y2="420"/>
  </g>

  <!-- boxes on shelves — dark grey -->
  <g fill="#1a1a1a">
    <!-- shelf 1 -->
    <rect x="18" y="42" width="36" height="38"/>
    <rect x="62" y="50" width="28" height="30"/>
    <rect x="148" y="38" width="40" height="42"/>
    <rect x="196" y="48" width="30" height="32"/>
    <rect x="280" y="40" width="34" height="40"/>
    <rect x="540" y="44" width="36" height="36"/>
    <rect x="584" y="50" width="28" height="30"/>
    <!-- shelf 2 -->
    <rect x="20" y="132" width="38" height="38"/>
    <rect x="66" y="138" width="30" height="32"/>
    <rect x="152" y="130" width="34" height="40"/>
    <rect x="280" y="136" width="36" height="34"/>
    <rect x="324" y="130" width="28" height="40"/>
    <rect x="542" y="132" width="32" height="38"/>
    <rect x="588" y="140" width="28" height="30"/>
    <rect x="662" y="134" width="30" height="36"/>
    <!-- shelf 3 -->
    <rect x="16" y="222" width="40" height="38"/>
    <rect x="64" y="226" width="30" height="34"/>
    <rect x="150" y="220" width="36" height="40"/>
    <rect x="194" y="228" width="28" height="32"/>
    <rect x="282" y="222" width="32" height="38"/>
    <rect x="540" y="224" width="38" height="36"/>
    <rect x="660" y="226" width="32" height="34"/>
    <!-- shelf 4 -->
    <rect x="18" y="312" width="36" height="38"/>
    <rect x="62" y="318" width="32" height="32"/>
    <rect x="148" y="310" width="38" height="40"/>
    <rect x="542" y="314" width="34" height="36"/>
    <rect x="586" y="318" width="28" height="32"/>
    <rect x="662" y="312" width="30" height="38"/>
  </g>

  <!-- terracotta boxes — sparse accent -->
  <g fill="#C4714A">
    <rect x="196" y="132" width="32" height="38"/>
    <rect x="324" y="222" width="30" height="38" opacity="0.7"/>
    <rect x="66" y="310" width="34" height="40"/>
    <rect x="196" y="312" width="28" height="38" opacity="0.6"/>
    <rect x="280" y="48" width="34" height="32" opacity="0.5"/>
  </g>

  <!-- chat bubble — wide and flat, 3:1 aspect, overlaps shelving 40%+ -->
  <!-- depth shadow behind bubble -->
  <rect x="188" y="108" width="360" height="120" rx="20" fill="#1a1a1a" opacity="0.3"/>
  <!-- bubble body -->
  <rect x="180" y="104" width="360" height="120" rx="20" fill="#0d0d0d" stroke="#C4714A" stroke-width="1"/>
  <!-- chunky angular tail pointing down-left at ~45 degrees -->
  <polygon points="230,224 186,290 280,226" fill="#0d0d0d" stroke="#C4714A" stroke-width="1" stroke-linejoin="miter"/>
  <!-- cover junction seam (wider to match chunky tail base) -->
  <rect x="228" y="212" width="56" height="16" fill="#0d0d0d"/>

  <!-- three terracotta dots — 12px diameter each, full opacity, evenly spaced -->
  <circle cx="320" cy="156" r="12" fill="#C4714A" opacity="1"/>
  <circle cx="360" cy="156" r="12" fill="#C4714A" opacity="1"/>
  <circle cx="400" cy="156" r="12" fill="#C4714A" opacity="1"/>

  <!-- faint message lines inside bubble -->
  <line x1="300" y1="186" x2="480" y2="186" stroke="#2e2e2e" stroke-width="1"/>
  <line x1="300" y1="198" x2="430" y2="198" stroke="#222222" stroke-width="1"/>
</svg>
